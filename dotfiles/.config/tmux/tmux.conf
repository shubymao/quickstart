# Minimal tmux status bar configuration
# Remove time and hostname, use simple memory indicator
set -g status on
set -g status-interval 5

# Left side: session name only
set -g status-left-length 20
set -g status-left '#[fg=green]#S'

# Right side: CPU, memory, battery (if available)
# Use simple text icons to avoid unsupported glyphs
set -g status-right '#[fg=yellow]CPU: #{cpu_percentage}% #[fg=cyan]MEM: #{memory_percentage}% #{?battery_status,BAT: #{battery_percentage}%,}'
