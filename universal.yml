---
- name: Universal Server Setup
  hosts: all
  gather_facts: true
  become: true
  vars_files:
    - vault.yml

  tasks:
    - name: Ensure .ssh directory exists
      ansible.builtin.file:
        path: "/home/{{ ansible_user }}/.ssh"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0700'

    - name: Copy SSH public key
      ansible.builtin.copy:
        src: "{{ ssh_public_key_path }}"
        dest: "/home/{{ ansible_user }}/.ssh/authorized_keys"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0600'

    - name: Test SSH key connection
      ansible.builtin.shell: |
        ssh -o BatchMode=yes -o ConnectTimeout=10 {{ ansible_user }}@{{ ansible_host }} exit 0
      register: ssh_test
      changed_when: false
      failed_when: false

    - name: Verify SSH key authentication works
      ansible.builtin.assert:
        that:
          - ssh_test.rc == 0
        fail_msg: "SSH key authentication failed"
        success_msg: "SSH key authentication verified"

    - name: Disable SSH password authentication
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^PasswordAuthentication'
        line: 'PasswordAuthentication no'
        validate: 'sshd -t -f %s'
      notify: Reload SSH

    - name: Ensure PermitRootLogin is disabled
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^PermitRootLogin'
        line: 'PermitRootLogin no'
        validate: 'sshd -t -f %s'
      notify: Reload SSH

  handlers:
    - name: Reload SSH
      ansible.builtin.service:
        name: sshd
        state: reloaded
