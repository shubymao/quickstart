- name: Ensure .ssh directory exists.
  file:
    dest: "{{ dest_ssh_pubkey | dirname }}"
    mode: 0700
    state: directory
  tags:
    - ssh
    - server

- name: Resolve SSH public key value
  set_fact:
    ssh_authorized_key_value: "{{ bootstrap_pubkey | default(lookup('file', ssh_public_key_file), true) | trim }}"
  tags:
    - ssh
    - server

- name: Validate SSH public key format
  assert:
    that:
      - ssh_authorized_key_value | length > 0
      - ssh_authorized_key_value is match('^ssh-(ed25519|rsa|ecdsa-[^ ]+) [A-Za-z0-9+/=]+(?: .*)?$')
    fail_msg: >-
      No valid SSH public key detected. Set bootstrap_pubkey or update
      {{ ssh_public_key_file }}.
  tags:
    - ssh
    - server

- name: Install ssh key public
  copy:
    src: "{{ ssh_public_key_file }}"
    dest: "{{ dest_ssh_pubkey }}"
    mode: 0644
  tags:
    - ssh
    - server

- name: Install ssh config
  copy:
    src: "../dotfiles/.ssh/config"
    dest: "~/.ssh/config"
    mode: 0644
  tags:
    - ssh
    - server
- name: try print user and item
  debug: 
    msg: Adding ssh key to user "{{ ansible_user_id }}"
  tags:
    - ssh
    - server
- name: Set authorized key took from file
  authorized_key:
    user: "{{ ansible_user_id }}"
    state: present
    key: "{{ ssh_authorized_key_value }}"
  tags: 
    - ssh
    - server
